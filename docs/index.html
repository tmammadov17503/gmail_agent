<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Email Agent (Smart Sorting & Skip Fix)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f2;--bg2:#ffffff;--bg3:#efede8;--bg4:#e8e6e0;
  --border:#dddbd4;--border2:#c8c6be;
  --text:#18170f;--text2:#6b6960;--text3:#aaa89f;
  --ink:#1c1b14;--ink2:#2e2d24;
  --primary:#1a4a88; --primary-bg:#e8f0fb;
  --green:#176b3a;--green-bg:#e6f4ec;--green-b:#b3ddc5;
  --red:#a83220;--red-bg:#faebe8;--red-b:#f0bdb5;
  --amber:#7a5200;--amber-bg:#fdf3dc;--amber-b:#f5d98a;
  --blue:#1a4a88;--blue-bg:#e8f0fb;--blue-b:#b5cef0;
  --teal:#0e6455;--teal-bg:#e4f5f1;--teal-b:#a8ddd4;
  --purple:#4a3888;--purple-bg:#eeecfb;--purple-b:#c5bef0;
  --gray:#5a5850;--gray-bg:#efefeb;--gray-b:#d0cec6;
  --pink:#8a1f5c;--pink-bg:#faeaf3;--pink-b:#e8b4d4;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

/* ━━━ ONBOARDING ━━━ */
#onboarding{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.ob-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:480px;width:100%;}
.ob-icon{font-size:28px;margin-bottom:16px;display:block;}
.ob-wrap h1{font-size:24px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px;}
.ob-wrap .sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.65;}
.step-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.ob-step{display:flex;gap:12px;background:var(--bg3);border-radius:10px;padding:12px 14px;align-items:flex-start;}
.ob-n{width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ob-t{font-size:12px;color:var(--text2);line-height:1.6;}
.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fl label{font-size:11px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:var(--text3);}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;}
.fi:focus{border-color:var(--ink);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'Instrument Sans',sans-serif;transition: 0.2s;}
.btn:hover:not(:disabled){background:var(--bg4);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.btn-ink{background:var(--ink);color:#fff;width:100%;padding:13px;font-size:14px;}
.btn-ink:hover:not(:disabled){background:var(--ink2);}
.err{font-size:12px;color:var(--red);margin-top:8px;padding:8px 12px;background:var(--red-bg);border-radius:8px;display:none;}
.erbox{background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--radius);padding:14px 18px;font-size:13px;color:var(--red);margin-bottom:14px;line-height:1.6;}

/* ━━━ APP SHELL ━━━ */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.on{display:flex;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-l, .tb-r{display:flex;align-items:center;gap:10px;}
.scan-btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;background:var(--ink);color:#fff;border:none;}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:196px;border-right:1px solid var(--border);background:var(--bg2);padding:14px 10px;overflow-y:auto;}
.sl{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text3);padding:4px 8px;}
.acc-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);}
.acc-item.active{background:var(--bg3);color:var(--text);}
.content{flex:1;overflow-y:auto;padding:20px 24px;}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:8px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab-badge{background:var(--bg3);padding:2px 6px;border-radius:10px;font-size:11px;}

/* Categories (Inside Tabs) */
.cb{margin-bottom:10px;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;user-select:none;}
.ch:hover{background:var(--bg3);}
.ch.open{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent;}
.chl{display:flex;align-items:center;gap:10px;}
.ctag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;font-family:'Geist Mono',monospace;}
.cn{font-size:12px;color:var(--text3);font-family:'Geist Mono',monospace;}
.chev{font-size:12px;color:var(--text3);transition:transform 0.2s;}
.chev.open{transform:rotate(90deg);}
.ep{display:none;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.ep.open{display:block;}

/* Email Rows */
.er{display:grid;grid-template-columns:1fr auto;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background 0.1s;}
.er:last-child{border-bottom:none;}
.er:hover{background:var(--bg3);}
.e-info{cursor:pointer;}
.ef{font-size:13px;font-weight:600;margin-bottom:1px;color:var(--text);}
.es{font-size:13px;color:var(--text2);margin-bottom:2px;}
.eq{font-size:11.5px;color:var(--text3);line-height:1.4;}
.snippet-full{display:none;margin-top:4px;color:var(--text2);background:var(--bg);padding:8px;border-radius:6px;}
.e-info.expanded .snippet-short{display:none;}
.e-info.expanded .snippet-full{display:block;}

.er2{display:flex;align-items:flex-start;gap:6px;}
.eb2{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);transition:all 0.15s;}
.eb2.kp{color:var(--green);border-color:var(--green-b);}
.eb2.kp:hover:not(:disabled){background:var(--green-bg);}
.eb2.dl{color:var(--red);border-color:var(--red-b);}
.eb2.dl:hover:not(:disabled){background:var(--red-bg);}

/* Top actions */
.tab-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.btn-del-all{color:var(--red);border-color:var(--red-b);background:var(--red-bg);}
.btn-del-all:hover:not(:disabled){background:#f4d2cd;}

/* Memory / empty */
.empty{text-align:center;padding:40px;color:var(--text3);}
.lb{padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:13px;display:flex;align-items:center;gap:10px;}
.mw{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.mw.open{display:flex;}
.mb{background:var(--bg2);padding:24px;border-radius:14px;width:400px;}
</style>
</head>
<body>

<div id="onboarding">
<div class="ob-wrap">
  <span class="ob-icon">🧠</span>
  <h1>Email Agent</h1>
  <p class="sub">Hybrid Edition: Tabs + Categories. <strong>Live Delete enabled.</strong> Features a Keep/Trash memory system to learn your habits.</p>
  <div class="fl"><label>Groq API Key</label><input class="fi" id="ob-gk" type="password"></div>
  <div class="fl"><label>Google OAuth Client ID</label><input class="fi" id="ob-oc" type="text"></div>
  <div class="fl"><label>Accounts</label>
    <select class="fi" id="ob-na"><option value="1">1 account</option><option value="2">2 accounts</option><option value="3" selected>3 accounts</option></select>
  </div>
  <button class="btn btn-ink" onclick="obSave()">Save & Launch →</button>
  <div class="err" id="ob-err"></div>
</div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-l"><div class="tb-logo">✉</div><span class="tb-title">Email Agent</span></div>
    <div class="tb-r">
      <button class="btn" onclick="openSettings()">⚙</button>
      <button class="scan-btn" onclick="runScan()" id="btn-scan">↻ Scan 100 Emails/Account</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sl">Accounts</div>
      <div id="sb-accs"></div>
    </div>
    <div class="content" id="content">
      <div class="empty">Click <strong>Scan</strong> to fetch and categorize your emails.</div>
    </div>
  </div>
</div>

<div class="mw" id="s-modal">
  <div class="mb">
    <h3>Settings</h3><br>
    <div class="fl"><label>Groq Key</label><input class="fi" id="s-gk" type="password"></div>
    <div class="fl"><label>Client ID</label><input class="fi" id="s-oc" type="text"></div>
    <br>
    <div style="display:flex;gap:10px;">
      <button class="btn" onclick="document.getElementById('s-modal').classList.remove('open')">Close</button>
      <button class="btn" style="color:red" onclick="resetApp()">Reset All Data</button>
      <button class="btn" style="color:red" onclick="clearMemory()">Clear AI Memory</button>
    </div>
  </div>
</div>

<script>
// Configuration
const TABS = ['Primary', 'Promotions', 'Social', 'Updates'];
const CATS = {
  important: {label:'Important', c:'var(--blue)',   bg:'var(--blue-bg)',   e:'★'},
  work:      {label:'Work',      c:'var(--purple)', bg:'var(--purple-bg)', e:'◈'},
  finance:   {label:'Finance',   c:'var(--green)',  bg:'var(--green-bg)',  e:'◉'},
  social:    {label:'Social',    c:'var(--pink)',   bg:'var(--pink-bg)',   e:'◎'},
  newsletter:{label:'Newsletter',c:'var(--teal)',   bg:'var(--teal-bg)',   e:'◆'},
  ads:       {label:'Ads',       c:'var(--amber)',  bg:'var(--amber-bg)',  e:'▲'},
  spam:      {label:'Spam',      c:'var(--red)',    bg:'var(--red-bg)',    e:'✕'},
  other:     {label:'Other',     c:'var(--gray)',   bg:'var(--gray-bg)',   e:'·'},
};
const CAT_ORDER = ['important','work','finance','social','newsletter','ads','spam','other'];

let cfg = {};
let allData = [];
let activeAcc = 0;
let activeTab = 'Primary';
let memory = { trashed: [], kept: [] }; 
let tokens = [];

let scanIndex = 0;
let scanErrors = [];

window.onload = function(){
  const saved = localStorage.getItem('ea_cfg');
  const savedMem = localStorage.getItem('ea_memory');
  
  if(savedMem) {
    let p = JSON.parse(savedMem);
    if(p.deleted_senders) memory = { trashed: p.deleted_senders, kept: [] };
    else memory = p;
  }
  
  if(saved){
    try{ cfg = JSON.parse(saved); initApp(); return; }catch(e){}
  }
  document.getElementById('onboarding').style.display='flex';
};

function obSave(){
  const gk = document.getElementById('ob-gk').value.trim();
  const oc = document.getElementById('ob-oc').value.trim();
  const na = parseInt(document.getElementById('ob-na').value);
  if(!gk || !oc) return;
  cfg = {groqKey:gk, clientId:oc, numAccounts:na};
  localStorage.setItem('ea_cfg', JSON.stringify(cfg));
  initApp();
}

function initApp(){
  allData = [];
  for(let i=0;i<cfg.numAccounts;i++) allData.push({email:'Account '+(i+1), emails:[]});
  document.getElementById('onboarding').style.display='none';
  document.getElementById('app').classList.add('on');
  renderSidebar();
}

function openSettings(){ document.getElementById('s-modal').classList.add('open'); }
function resetApp(){ localStorage.clear(); location.reload(); }
function clearMemory(){ memory = {trashed: [], kept: []}; localStorage.setItem('ea_memory', JSON.stringify(memory)); alert('AI Memory wiped.'); }

// ━━━ MEMORY LOGIC ━━━
function learnAction(sender, action) {
  if(!sender || sender === '(Unknown Sender)') return;
  
  if(action === 'trash') {
    memory.kept = memory.kept.filter(s => s !== sender);
    if(!memory.trashed.includes(sender)) memory.trashed.push(sender);
  } else if (action === 'keep') {
    memory.trashed = memory.trashed.filter(s => s !== sender);
    if(!memory.kept.includes(sender)) memory.kept.push(sender);
  }
  
  if(memory.trashed.length > 40) memory.trashed.shift();
  if(memory.kept.length > 40) memory.kept.shift();
  
  localStorage.setItem('ea_memory', JSON.stringify(memory));
}

// ━━━ AUTH & FETCH ━━━
function gmailAuth(idx){
  return new Promise((res,rej)=>{
    const scope='https://www.googleapis.com/auth/gmail.modify';
    const redir=location.href.split('?')[0].split('#')[0];
    const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(cfg.clientId)}&redirect_uri=${encodeURIComponent(redir)}&response_type=token&scope=${encodeURIComponent(scope)}&prompt=select_account`;
    const pop=window.open(url,'ga'+idx,'width=500,height=600,left=300,top=80');
    if(!pop){rej(new Error('Browser blocked the popup window.'));return;}
    
    const t=setInterval(()=>{
      if(pop.closed){clearInterval(t);rej(new Error('Auth window closed manually.'));}
      try{
        if(pop.location.href.includes('access_token=')){
          clearInterval(t); pop.close();
          res(new URLSearchParams(pop.location.href.split('#')[1]).get('access_token'));
        }
      }catch(e){}
    },500);
  });
}

async function gmailFetch(token){
  const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=100&q=in:inbox', {headers:{Authorization:'Bearer '+token}});
  if(!r.ok) {
    const errData = await r.json();
    throw new Error(`Google API blocked the request. Did you check the permission box? Details: ${errData.error?.message || r.status}`);
  }
  
  const d=await r.json();
  if(!d.messages) return [];
  
  let msgs = [];
  for(let i=0; i<d.messages.length; i+=25){
    const chunk = d.messages.slice(i, i+25);
    const chunkRes = await Promise.all(chunk.map(m=>
      fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject`,
        {headers:{Authorization:'Bearer '+token}}).then(res=>res.json())
    ));
    msgs.push(...chunkRes);
  }

  return msgs.map(m=>{
    const getHeader = (name) => {
      const h = m.payload?.headers?.find(x => x.name.toLowerCase() === name.toLowerCase());
      return h ? h.value : '';
    };
    
    return { 
      id: m.id, 
      from: getHeader('From').replace(/<[^>]+>/,'').trim() || '(Unknown Sender)', 
      subject: getHeader('Subject') || '(No Subject)', 
      snippet: m.snippet || 'No preview available.' 
    };
  });
}

// ━━━ AI CATEGORIZATION (UPGRADED PROMPT) ━━━
async function groqCategorizeBatch(emails){
  let allCats = [];
  const BATCH_SIZE = 25; 
  
  for(let i=0; i<emails.length; i+=BATCH_SIZE) {
    const chunk = emails.slice(i, i+BATCH_SIZE);
    const list = chunk.map((e,idx)=>`[${idx}] From: ${e.from}\nSubj: ${e.subject}`).join('\n');
    
    let memoryContext = "";
    if(memory.trashed.length > 0) memoryContext += `\n[MEMORY] USER TRASHES emails from: ${memory.trashed.join(', ')}. Route to 'Promotions' or 'Updates' tab and 'spam' or 'ads' category.`;
    if(memory.kept.length > 0) memoryContext += `\n[MEMORY] USER KEEPS emails from: ${memory.kept.join(', ')}. Route to 'Primary' tab and 'important' or 'work' category.`;

    // EXPLICIT RULES to force Groq to classify correctly
    const systemPrompt = `You are a strict email sorting algorithm. You MUST assign each email a "tab" AND a "category".
    [VALID TABS]: Primary, Promotions, Social, Updates
    [VALID CATEGORIES]: important, work, finance, social, newsletter, ads, spam, other
    
    [ROUTING RULES]:
    - If sender is LinkedIn, Facebook, Instagram, Twitter, TikTok, Booking.com -> Tab MUST BE "Social", Category MUST BE "social".
    - If email is a discount, sale, store offer, or marketing -> Tab MUST BE "Promotions", Category MUST BE "ads".
    - If email is a receipt, bill, bank alert -> Tab MUST BE "Updates", Category MUST BE "finance".
    - If email is an automated system alert, job alert, Codeforces -> Tab MUST BE "Updates", Category MUST BE "work" or "other".
    - If email is a real human directly emailing the user -> Tab MUST BE "Primary", Category MUST BE "important".
    ${memoryContext}
    
    Return ONLY a valid JSON object matching the exact order of the emails provided:
    {"results": [{"tab": "...", "category": "..."}]}`;

    try {
      const r=await fetch(`https://api.groq.com/openai/v1/chat/completions`,{
        method:'POST',
        headers:{'Content-Type':'application/json', 'Authorization': `Bearer ${cfg.groqKey}`},
        body:JSON.stringify({
          model: "llama-3.1-8b-instant",
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: list }
          ],
          response_format: { type: "json_object" },
          max_tokens: 2048
        })
      });
      
      if(!r.ok) {
          chunk.forEach(()=> allCats.push({tab: 'Primary', category: 'other'}));
          continue;
      }

      const d=await r.json();
      const parsed = JSON.parse(d.choices[0].message.content).results || [];
      
      for(let j=0; j<chunk.length; j++) {
          let t = parsed[j]?.tab;
          let c = parsed[j]?.category;
          if(!TABS.includes(t)) t = 'Primary';
          if(!CAT_ORDER.includes(c)) c = 'other';
          allCats.push({tab: t, category: c});
      }
    } catch(e) {
       chunk.forEach(()=> allCats.push({tab: 'Primary', category: 'other'}));
    }
  }
  return allCats;
}

// ━━━ SCAN LOGIC ━━━
async function runScan(){
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  scanErrors = [];
  scanIndex = 0;
  showNextAccountPrompt();
}

function showNextAccountPrompt(){
  const i = scanIndex;
  if(i >= cfg.numAccounts){ finishScan(); return; }
  
  const c = document.getElementById('content');
  const skip = i > 0 ? `<button class="btn" style="margin-left:8px;" onclick="skipAccount(${i})">Skip account ${i+1}</button>` : '';
  
  c.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:16px;">
      <div style="font-size:32px;">📬</div>
      <div style="font-size:15px;font-weight:600;">Connect Account ${i+1} of ${cfg.numAccounts}</div>
      <div style="font-size:13px;color:var(--text2);max-width:360px;line-height:1.6;">
        Click the button below to authenticate.
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-ink" style="width:auto;padding:12px 28px;font-size:14px;" onclick="connectAccount(${i})">Authenticate Account ${i+1} →</button>
        ${skip}
      </div>
    </div>`;
}

function skipAccount(i){
  // FIXED: No longer wipes existing emails for the skipped account.
  scanIndex++;
  showNextAccountPrompt();
}

async function connectAccount(i){
  const c = document.getElementById('content');
  try{
    c.innerHTML=`<div class="lb"><span>🔄</span> Connecting Account ${i+1}... (Check popup)</div>`;
    const tok = await gmailAuth(i);
    tokens[i] = tok; 
    
    c.innerHTML=`<div class="lb"><span>📥</span> Fetching 100 emails securely...</div>`;
    const pr = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile',{headers:{Authorization:'Bearer '+tok}});
    allData[i].email = (await pr.json()).emailAddress;

    const emails = await gmailFetch(tok);
    if(emails.length){
      c.innerHTML=`<div class="lb"><span>🧠</span> Groq AI is categorizing ${emails.length} emails using your memory...</div>`;
      const cats = await groqCategorizeBatch(emails);
      allData[i].emails = emails.map((e,j)=>({...e, tab: cats[j].tab, category: cats[j].category}));
    } else {
      allData[i].emails = [];
    }
  }catch(e){ 
    // FIXED: Does not wipe existing emails if the login fails or is closed early.
    scanErrors.push(`Account ${i+1}: ${e.message}`);
  }
  
  renderSidebar();
  scanIndex++;
  showNextAccountPrompt(); 
}

function finishScan(){
  const btn = document.getElementById('btn-scan');
  btn.disabled = false;
  renderSidebar();
  renderContent();
  
  if(scanErrors.length > 0) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'erbox';
      errorDiv.innerHTML = `<strong>Scan Errors:</strong><br>` + scanErrors.map(err => `• ${err}`).join('<br>');
      document.getElementById('content').prepend(errorDiv);
  }
}

// ━━━ RENDER LOGIC ━━━
function renderSidebar(){
  document.getElementById('sb-accs').innerHTML=allData.map((a,i)=>`
    <div class="acc-item ${i===activeAcc?'active':''}" onclick="activeAcc=${i}; renderContent(); renderSidebar();">
      ${a.email || 'Account '+(i+1)}
    </div>`).join('');
}

function groupByCategory(emails) {
  const g = {};
  emails.forEach(e => { if(!g[e.category]) g[e.category] = []; g[e.category].push(e); });
  return g;
}

function renderContent(){
  const acc = allData[activeAcc];
  if(!acc.emails || !acc.emails.length) { 
      if(!document.querySelector('.erbox')) document.getElementById('content').innerHTML = '<div class="empty">No emails loaded for this account. Hit Scan!</div>'; 
      return; 
  }
  
  // Render Tabs
  let html = `<div class="tabs">`;
  TABS.forEach(tab => {
    const count = acc.emails.filter(e => e.tab === tab).length;
    html += `<div class="tab ${activeTab===tab?'active':''}" onclick="activeTab='${tab}'; renderContent()">
      ${tab} <span class="tab-badge">${count}</span>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="tab-actions">
    <div style="font-size:12px;color:var(--text3)">Emails in ${activeTab}</div>
    <button class="btn btn-del-all" onclick="deleteAllInTab(this)">🗑 Trash entire ${activeTab} Tab</button>
  </div>`;

  // Filter emails for current Tab
  const tabEmails = acc.emails.filter(e => e.tab === activeTab);
  if(tabEmails.length === 0) html += `<div class="empty">Nothing here!</div>`;
  
  // Group by Category inside the Tab
  const grouped = groupByCategory(tabEmails);
  
  CAT_ORDER.forEach(cat => {
    const list = grouped[cat];
    if(!list || !list.length) return;
    
    const cfg2 = CATS[cat];
    const open = list.length > 0; // Keep open by default if it has items
    
    html += `
      <div class="cb">
        <div class="ch ${open?'open':''}" onclick="togCat(this)">
          <div class="chl">
            <span class="ctag" style="background:${cfg2.bg};color:${cfg2.c}">${cfg2.e} ${cfg2.label}</span>
            <span class="cn">${list.length} email${list.length>1?'s':''}</span>
          </div>
          <span class="chev ${open?'open':''}">▶</span>
        </div>
        <div class="ep ${open?'open':''}">`;

    list.forEach(e => {
      html += `
        <div class="er" id="em-${e.id}">
          <div class="e-info" onclick="this.classList.toggle('expanded')" title="Click to read full preview">
            <div class="ef">${e.from}</div>
            <div class="es">${e.subject}</div>
            <div class="eq snippet-short">${e.snippet.substring(0,80)}... <span style="color:var(--blue);font-weight:500;">(Read more)</span></div>
            <div class="eq snippet-full">${e.snippet}</div>
          </div>
          <div class="er2">
            <button class="eb2 kp" onclick="keepSingle('${e.id}', '${e.from}', this)">Keep</button>
            <button class="eb2 dl" onclick="deleteSingle('${e.id}', '${e.from}', this)">Trash</button>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  const existingError = document.querySelector('.erbox');
  document.getElementById('content').innerHTML = html;
  if(existingError) document.getElementById('content').prepend(existingError);
}

function togCat(h){
  const p = h.nextElementSibling, cv = h.querySelector('.chev');
  h.classList.toggle('open'); p.classList.toggle('open'); cv.classList.toggle('open');
}

// ━━━ ACTIONS ━━━

function keepSingle(id, sender, btn){
  const acc = allData[activeAcc];
  learnAction(sender, 'keep'); 
  document.getElementById('em-'+id).style.display = 'none';
  acc.emails = acc.emails.filter(e => e.id !== id);
  renderSidebar(); 
}

async function deleteSingle(id, sender, btn){
  const acc = allData[activeAcc];
  btn.disabled = true;
  btn.textContent = 'Trashing...';

  try {
    const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}/trash`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + tokens[activeAcc] }
    });
    if(!r.ok) throw new Error('API Error');

    learnAction(sender, 'trash'); 
    document.getElementById('em-'+id).style.display = 'none';
    acc.emails = acc.emails.filter(e => e.id !== id);
    renderSidebar(); 
  } catch(e) {
    alert('Failed to trash. Please reset your data and Re-Scan to accept the new Google Delete Permissions.');
    btn.disabled = false;
    btn.textContent = 'Trash';
  }
}

async function deleteAllInTab(btn){
  const acc = allData[activeAcc];
  const toDelete = acc.emails.filter(e => e.tab === activeTab);
  if(toDelete.length === 0) return;
  
  if(!confirm(`Move ${toDelete.length} emails from ${activeTab} directly to your Gmail Trash?`)) return;
  
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = 'Moving to Trash...';
  
  try {
    await Promise.all(toDelete.map(async (e) => {
      await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${e.id}/trash`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + tokens[activeAcc] }
      });
      learnAction(e.from, 'trash');
    }));
    
    acc.emails = acc.emails.filter(e => e.tab !== activeTab);
    renderContent();
    renderSidebar();
  } catch(e) {
    alert('Some emails failed to trash. Check permissions.');
    btn.disabled = false;
    btn.textContent = originalText;
  }
}
</script>
